<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Eyes Follow Mouse</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  background:black;
}

.container{
  display:flex;
  gap:20px;
}

.container .eyes{
  position:relative;
  width:100px;
  height:100px;
  background:#fff;
  border-radius:50%;
}

.container .eyes::before{
  content:"";
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:40px;
  height:40px;
  background:black;
  border-radius:50%;
}
</style>

</head>

<body>

<div class="container">
  <div class="eyes"></div>
  <div class="eyes"></div>
</div>

<script>

document.querySelector("body").addEventListener("mousemove", eyeball);

function eyeball(){
  const eyes = document.querySelectorAll(".eyes");

  eyes.forEach(function(eye){
    
    let x = (eye.getBoundingClientRect().left) + (eye.clientWidth/2);
    let y = (eye.getBoundingClientRect().top) + (eye.clientHeight/2);

    let radian = Math.atan2(event.pageX - x, event.pageY - y);
    let rot = (radian * (180/Math.PI) * -1) + 270;

    eye.style.transform = "rotate(" + rot + "deg)";
    
  });

}

</script>

</body>
</html>
